<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shins 정보처리기사 프로젝트</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --text-muted: #8b949e;
            --accent-color: #58a6ff;
            --success-color: #2ea44f;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: '-apple-system', BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            border: 1px solid #21262d;
        }
        .tag {
            background: rgba(88, 166, 255, 0.1);
            color: var(--accent-color);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 15px;
        }
        h1 {
            font-size: 2.2rem;
            margin: 0 0 10px 0;
            color: #f0f6fc;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        p {
            color: var(--text-muted);
            font-size: 1.05rem;
            line-height: 1.6;
            margin: 0 0 35px 0;
        }
        .menu-box {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .btn {
            background-color: #21262d;
            color: var(--text-color);
            border: 1px solid #30363d;
            padding: 16px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: block;
        }
        .btn:hover {
            background-color: var(--accent-color);
            color: #fff;
            border-color: var(--accent-color);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(88, 166, 255, 0.3);
        }
        .btn-success {
            background-color: var(--success-color);
            border-color: var(--success-color);
            color: #fff;
        }
        .btn-success:hover {
            background-color: #2c974b;
            border-color: #2c974b;
            box-shadow: 0 4px 12px rgba(46, 164, 79, 0.3);
        }
        footer {
            margin-top: 40px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="tag">PASS GUARANTEE</span>
        <h1>Shins 정처기 준비방</h1>
        <p>내가 합격하려고 직접 독하게 빌드한<br>정보처리기사 필기 300제 오답노트 포털</p>
        
        <div class="menu-box">
            <a href="exam.html" class="btn btn-success">⚔️ 실전 모의고사장 입장</a>
            <a href="note.html" class="btn">📚 오답노트 확인</a>
        </div>
        
        <footer>
            <p style="font-size: 0.85rem; margin: 0;">Designed & Developed by Shin Min-jong. © 2026</p>
        </footer>
    </div>
</body>
</html>
