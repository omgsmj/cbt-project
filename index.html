<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shins 정보처리기사 프로젝트</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --text-muted: #8b949e;
            --accent-color: #58a6ff;
            --success-color: #2ea44f;
            --admin-color: #ab7df6; /* 관리자 테마 포인트 컬러 신설 */
            --border-color: #21262d;
            --btn-border: #30363d;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: '-apple-system', BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            border: 1px solid var(--border-color);
            box-sizing: border-box;
        }
        .tag {
            background: rgba(88, 166, 255, 0.1);
            color: var(--accent-color);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }
        h1 {
            font-size: 2.2rem;
            margin: 0 0 12px 0;
            color: #f0f6fc;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        p {
            color: var(--text-muted);
            font-size: 1.05rem;
            line-height: 1.6;
            margin: 0 0 35px 0;
        }
        .menu-box {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .btn {
            background-color: #21262d;
            color: var(--text-color);
            border: 1px solid var(--btn-border);
            padding: 16px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            display: block;
            box-sizing: border-box;
        }
        .btn:hover {
            background-color: var(--accent-color);
            color: #fff;
            border-color: var(--accent-color);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(88, 166, 255, 0.25);
        }
        .btn-success {
            background-color: var(--success-color);
            border-color: var(--success-color);
            color: #fff;
        }
        .btn-success:hover {
            background-color: #2c974b;
            border-color: #2c974b;
            box-shadow: 0 6px 20px rgba(46, 164, 79, 0.3);
        }

        /* 📁 관리자 업로드 전용 버튼 스타일 정의 */
        .btn-admin {
            background-color: #12161c;
            border-color: #21262d;
            color: var(--text-muted);
            font-size: 0.95rem;
            padding: 12px;
            margin-top: 5px; /* 약간의 여백 분리 */
        }
        .btn-admin:hover {
            background-color: rgba(171, 125, 246, 0.1);
            color: var(--admin-color);
            border-color: var(--admin-color);
            box-shadow: 0 6px 15px rgba(171, 125, 246, 0.15);
        }

        footer {
            margin-top: 40px;
            border-top: 1px solid #21262d;
            padding-top: 20px;
        }
        footer p {
            font-size: 0.85rem;
            margin: 0;
            color: var(--text-muted);
        }

        /* 📱 모의고사 모바일 환경 UI 대응 미디어 쿼리 */
        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            p { font-size: 0.95rem; margin-bottom: 25px; }
            .container { padding: 30px 20px; }
            .btn { padding: 14px; font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="tag">FOR PASS</span>
        <h1>Shins 정처기 준비방</h1>
        <p>내가 합격하려고 직접 빌드한<br>정보처리기사 필기 300제 오답노트 포털</p>
        
        <div class="menu-box">
            <a href="exam.html" class="btn btn-success">⚔️ 실전 모의고사장 입장</a>
            <a href="note.html" class="btn">📚 오답노트 확인</a>
            <a href="upload.html" class="btn btn-admin">⚙️ 새 기출문제 PDF 업로드 (관리자)</a>
        </div>
        
        <footer>
            <p>Designed & Developed by Shin Min-Jong. © 2026</p>
        </footer>
    </div>
</body>
</html>
