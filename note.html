<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shins 정보처리기사 - 오답노트 보관함</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --text-muted: #8b949e;
            --accent-color: #58a6ff;
            --success-color: #2ea44f;
            --danger-color: #f85149;
            --warning-color: #ff9900;
            --border-color: #30363d;
            --folder-hover: #21262d;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; 
            margin: 0; 
            padding: 40px 20px; 
            background-color: var(--bg-color); 
            color: var(--text-color);
        }

        .wrapper { max-width: 900px; margin: 0 auto; }
        
        .header-area { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--border-color); 
            padding-bottom: 20px; 
            margin-bottom: 30px; 
        }
        .header-area h2 { margin: 0; color: #f0f6fc; font-weight: 700; letter-spacing: -0.5px; }
        
        .btn-home { 
            padding: 10px 20px; 
            background: #21262d; 
            color: var(--text-color); 
            text-decoration: none; 
            border-radius: 6px; 
            font-weight: bold; 
            border: 1px solid var(--border-color);
            transition: all 0.2s;
        }
        .btn-home:hover { background: var(--folder-hover); color: #f0f6fc; }

        .folder-bar { 
            background: var(--card-bg); 
            border: 1px solid var(--border-color); 
            padding: 18px 24px; 
            margin-bottom: 10px; 
            border-radius: 8px; 
            cursor: pointer; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            transition: all 0.2s;
        }
        .folder-bar:hover { background: var(--folder-hover); border-color: #444c56; }
        .folder-info { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; font-weight: 600; color: #f0f6fc; }

        .badge { 
            display: inline-block; 
            padding: 4px 10px; 
            font-size: 11px; 
            font-weight: bold; 
            color: white; 
            border-radius: 4px; 
        }
        .badge.pass { background: rgba(46, 164, 79, 0.15); color: #56d364; border: 1px solid rgba(46, 164, 79, 0.3); }
        .badge.fail { background: rgba(248, 81, 73, 0.15); color: #ff7b72; border: 1px solid rgba(248, 81, 73, 0.3); }

        .folder-content { 
            display: none; 
            padding: 25px; 
            border: 1px solid var(--border-color); 
            border-top: none; 
            margin-top: -14px; 
            margin-bottom: 20px; 
            background: #12161c; 
            border-radius: 0 0 8px 8px; 
        }

        .quiz-card { 
            background: var(--card-bg); 
            padding: 20px; 
            border-left: 4px solid var(--danger-color); 
            border-radius: 6px; 
            margin-bottom: 20px; 
            border-top: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .quiz-card:last-child { margin-bottom: 0; }
        .quiz-card h4 { margin: 0 0 12px 0; color: var(--accent-color); font-size: 0.95rem; }
        .quiz-card p.q-text { font-weight: bold; margin-bottom: 16px; color: #f0f6fc; font-size: 1.05rem; line-height: 1.4; }
        
        .opt-line { margin: 8px 0; padding: 6px 10px; border-radius: 4px; font-size: 0.95rem; color: var(--text-color); }

        /* 제어 버튼 그룹 */
        .btn-group { display: flex; gap: 10px; margin-top: 12px; }

        .btn-explain-toggle {
            background: #21262d;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            font-size: 0.85rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-explain-toggle:hover { background: #30363d; color: #f0f6fc; }
        
        /* AI 버튼 전용 형광 포인트 세팅 */
        .btn-ai-explain {
            background: rgba(88, 166, 255, 0.1);
            color: var(--accent-color);
            border: 1px solid rgba(88, 166, 255, 0.3);
        }
        .btn-ai-explain:hover {
            background: var(--accent-color);
            color: #000;
            box-shadow: 0 0 12px rgba(88, 166, 255, 0.4);
        }
        
        .explain-wrapper {
            display: none;
            margin-top: 12px;
            padding: 15px;
            background: #1f242c;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            font-size: 0.95rem;
            line-height: 1.6;
            color: #e6edf2;
            white-space: pre-wrap;
        }

        .btn-delete-folder { 
            background: rgba(248, 81, 73, 0.1); 
            color: var(--danger-color); 
            border: 1px solid rgba(248, 81, 73, 0.2); 
            padding: 6px 14px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 0.85rem; 
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-delete-folder:hover { background: var(--danger-color); color: white; border-color: var(--danger-color); }
        
        .empty-msg { text-align: center; color: var(--text-muted); padding: 50px 0; font-size: 1.1rem; line-height: 1.6; }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="header-area">
            <h2>📁 나의 오답노트 폴더 관리함</h2>
            <div>
                <a href="index.html" class="btn-home">← 메인으로 이탈</a>
            </div>
        </div>

        <div id="folder-list-area">
            <p style="text-align: center; color: var(--accent-color);">🔄 클라우드 인프라에서 오답노트 폴더 트리 구조를 빌드하는 중...</p>
        </div>
    </div>

    <script>
        // ⚠️ [주소 확인] 본인의 실제 Render 주소로 기입해 두세요!
        const BACKEND_URL = "https://shins-cbt.onrender.com";
        const optionSymbols = ["", "①", "②", "③", "④"];

        async function displayFolders() {
            const listArea = document.getElementById("folder-list-area");

            try {
                const response = await fetch(`${BACKEND_URL}/api/histories`);
                const folderHistory = await response.json();

                if (folderHistory.length === 0) {
                    listArea.innerHTML = `
                        <p class="empty-msg">
                            보관된 오답 기록 폴더가 원격 DB에 존재하지 않습니다.<br>
                            <span style="font-size:0.9rem; color:var(--text-muted);">시험장에서 모의고사를 치르면 실시간 트랜잭션으로 폴더가 누적됩니다.</span>
                        </p>`;
                    return;
                }

                let htmlContent = "";
                
                folderHistory.forEach(function(folder) {
                    const badgeClass = folder.result === "합격" ? "pass" : "fail";
                    
                    htmlContent += `
                        <div class="folder-bar" onclick="toggleFolder(${folder.id})">
                            <div class="folder-info">
                                <span style="font-size: 1.1rem;">📂</span> 
                                <span>[${folder.examTitle}]</span> 
                                <span style="color: var(--text-muted); font-weight: normal;">${folder.folderName}</span>
                                <span class="badge ${badgeClass}">${folder.result} (${folder.score}점)</span>
                                <span style="font-size:12px; color: var(--text-muted); font-weight: normal; margin-left:5px;">(틀린 문항: ${folder.questions.length}개)</span>
                            </div>
                            <button class="btn-delete-folder" onclick="deleteFolder(${folder.id}, event)">폴더 삭제</button>
                        </div>
                        
                        <div class="folder-content" id="content-${folder.id}">`;

                    folder.questions.forEach(function(q, qIdx) {
                        const uniqueId = `explain-${folder.id}-${qIdx}`;
                        const aiUniqueId = `ai-explain-${folder.id}-${qIdx}`;
                        
                        // 문자열 특수문자 깨짐을 완벽 방지하기 위한 가상 인코딩 처리 후 주입
                        const stringifiedQ = encodeURIComponent(JSON.stringify(q));

                        htmlContent += `
                            <div class="quiz-card">
                                <h4>No.${q.number} <span style="color:var(--text-muted); font-size:0.8rem; margin-left:6px;">[${q.subject}]</span></h4>
                                <p class="q-text">Q. ${q.question}</p>`;
                        
                        q.options.forEach(function(opt, optIdx) {
                            const idxNum = optIdx + 1;
                            const isCorrect = (idxNum === parseInt(q.answer));
                            const isUserCheck = (idxNum === parseInt(q.userAnswer));
                            
                            let optionStyle = "";
                            let checkMark = "";
                            
                            if(isCorrect) {
                                optionStyle = "background: rgba(46, 164, 79, 0.1); color: #56d364; font-weight: bold; border-left: 3px solid var(--success-color);";
                                checkMark = " <span style='font-size:12px; margin-left:6px;'>✔️ (정답)</span>";
                            } else if(isUserCheck) {
                                optionStyle = "background: rgba(248, 81, 73, 0.08); color: #ff7b72; text-decoration: line-through; border-left: 3px solid var(--danger-color);";
                                checkMark = " <span style='font-size:12px; margin-left:6px;'>❌ (내가 제출한 오답)</span>";
                            }

                            htmlContent += `<div class="opt-line" style="${optionStyle}">${optionSymbols[idxNum]} ${opt}${checkMark}</div>`;
                        });

                        const expText = q.explanation ? q.explanation : "해당 문항의 해설 텍스트 데이터가 비어있습니다.";
                        
                        // 기본 서적 해설 스위치와 AI 튜터링 스위치를 듀얼 배치
                        htmlContent += `
                            <div class="btn-group">
                                <button class="btn-explain-toggle" onclick="toggleExplanation('${uniqueId}', event)">💡 정답 해설 서적 보기</button>
                                <button class="btn-explain-toggle btn-ai-explain" id="btn-ai-node-${uniqueId}" onclick="askGeminiAI('${uniqueId}', '${aiUniqueId}', '${stringifiedQ}', event)">🤖 AI 1:1 족집게 과외 받기</button>
                            </div>
                            <div class="explain-wrapper" id="${uniqueId}">${expText}</div>
                            <div class="explain-wrapper" style="border-color: var(--accent-color); background: #0f141c;" id="${aiUniqueId}"></div>
                        </div>`;
                    });

                    htmlContent += `</div>`; 
                });

                listArea.innerHTML = htmlContent;

            } catch(e) {
                console.error(e);
                listArea.innerHTML = `<p class="empty-msg" style="color:var(--danger-color);">❌ 클라우드 통신 실패! 백엔드 서버 파이프라인 연동 상태를 확인해 주세요.</p>`;
            }
        }

        function toggleFolder(folderId) {
            const contentBox = document.getElementById(`content-${folderId}`);
            if(contentBox) {
                contentBox.style.display = (contentBox.style.display === "block") ? "none" : "block";
            }
        }

        function toggleExplanation(elementId, event) {
            event.stopPropagation();
            const expBox = document.getElementById(elementId);
            if(expBox) {
                expBox.style.display = (expBox.style.display === "block") ? "none" : "block";
            }
        }

        // 🤖 실시간 원격 AI 튜터링 통신 파이프라인 함수
        async function askGeminiAI(btnId, aiBoxId, encodedQ, event) {
            event.stopPropagation();
            const aiBox = document.getElementById(aiBoxId);
            const btn = document.getElementById(`btn-ai-node-${btnId}`);
            const qDataObject = JSON.parse(decodeURIComponent(encodedQ));

            // 이미 AI 데이터를 한 번 불러왔다면 통신 생략하고 토글만 처리
            if (aiBox.innerHTML !== "" && aiBox.style.display !== "block") {
                aiBox.style.display = "block";
                return;
            } else if (aiBox.style.display === "block") {
                aiBox.style.display = "none";
                return;
            }

            btn.innerText = "⚡ AI 분석 노트 생성 중...";
            aiBox.innerHTML = `<span style="color: var(--accent-color);">⚡ Shins AI가 보기 문항과 핵심 키워드를 교차 대조하는 중입니다. 잠시만 기다려 주세요...</span>`;
            aiBox.style.display = "block";

            try {
                const response = await fetch(`${BACKEND_URL}/api/explain-ai`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        question: qDataObject.question,
                        options: qDataObject.options,
                        subject: qDataObject.subject,
                        number: qDataObject.number
                    })
                });
                
                const resData = await response.json();
                if (resData.explanation) {
                    btn.innerText = "🤖 AI 과외 상자 접기";
                    aiBox.innerHTML = resData.explanation;
                } else {
                    aiBox.innerHTML = `<span style="color: var(--danger-color);">❌ AI 해설 응답 패킷이 비어있습니다.</span>`;
                }
            } catch (err) {
                console.error(err);
                aiBox.innerHTML = `<span style="color: var(--danger-color);">❌ 백엔드 AI 허브 연동 실패. 렌더 대시보드 환경변수(GEMINI_API_KEY)를 확인하세요.</span>`;
            }
        }

        async function deleteFolder(folderId, event) {
            event.stopPropagation(); 
            if (confirm("해당 시험 회차의 폴더 기록과 오답 목록을 데이터베이스에서 완전히 삭제하시겠습니까?")) {
                try {
                    const response = await fetch(`${BACKEND_URL}/api/histories/${folderId}`, { method: 'DELETE' });
                    const resData = await response.json();
                    if(resData.success) displayFolders(); 
                } catch(err) {
                    alert("서버 연결 실패로 삭제 작업을 완료하지 못했습니다.");
                }
            }
        }

        displayFolders();
    </script>
</body>
</html>
