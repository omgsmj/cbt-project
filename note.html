<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shins 정처기 - 오답노트 보관함</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --text-muted: #8b949e;
            --accent-color: #58a6ff;
            --success-color: #2ea44f;
            --danger-color: #f85149;
            --warning-color: #ff9900;
            --border-color: #30363d;
            --folder-hover: #21262d;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; 
            margin: 0; 
            padding: 40px 20px; 
            background-color: var(--bg-color); 
            color: var(--text-color);
        }

        .wrapper { max-width: 900px; margin: 0 auto; }
        
        /* 상단 헤더 영역 */
        .header-area { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--border-color); 
            padding-bottom: 20px; 
            margin-bottom: 30px; 
        }
        .header-area h2 { margin: 0; color: #f0f6fc; font-weight: 700; letter-spacing: -0.5px; }
        
        .btn-home { 
            padding: 10px 20px; 
            background: #21262d; 
            color: var(--text-color); 
            text-decoration: none; 
            border-radius: 6px; 
            font-weight: bold; 
            border: 1px solid var(--border-color);
            transition: all 0.2s;
        }
        .btn-home:hover { background: var(--folder-hover); color: #f0f6fc; }

        /* 아코디언 폴더 바 */
        .folder-bar { 
            background: var(--card-bg); 
            border: 1px solid var(--border-color); 
            padding: 18px 24px; 
            margin-bottom: 10px; 
            border-radius: 8px; 
            cursor: pointer; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            transition: all 0.2s;
        }
        .folder-bar:hover { background: var(--folder-hover); border-color: #444c56; }
        .folder-info { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; font-weight: 600; color: #f0f6fc; }

        /* 상태 배지 */
        .badge { 
            display: inline-block; 
            padding: 4px 10px; 
            font-size: 11px; 
            font-weight: bold; 
            color: white; 
            border-radius: 4px; 
        }
        .badge.pass { background: rgba(46, 164, 79, 0.15); color: #56d364; border: 1px solid rgba(46, 164, 79, 0.3); }
        .badge.fail { background: rgba(248, 81, 73, 0.15); color: #ff7b72; border: 1px solid rgba(248, 81, 73, 0.3); }

        /* 폴더 내부 콘텐츠 구역 */
        .folder-content { 
            display: none; 
            padding: 25px; 
            border: 1px solid var(--border-color); 
            border-top: none; 
            margin-top: -14px; 
            margin-bottom: 20px; 
            background: #12161c; 
            border-radius: 0 0 8px 8px; 
        }

        /* 내부에 렌더링될 문제 카드 */
        .quiz-card { 
            background: var(--card-bg); 
            padding: 20px; 
            border-left: 4px solid var(--danger-color); 
            border-radius: 6px; 
            margin-bottom: 15px; 
            border-top: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .quiz-card:last-child { margin-bottom: 0; }
        .quiz-card h4 { margin: 0 0 12px 0; color: var(--accent-color); font-size: 0.95rem; }
        .quiz-card p.q-text { font-weight: bold; margin-bottom: 16px; color: #f0f6fc; font-size: 1.05rem; line-height: 1.4; }
        
        /* 보기 문장 스타일 */
        .opt-line { margin: 8px 0; padding: 6px 10px; border-radius: 4px; font-size: 0.95rem; color: var(--text-color); }

        /* 폴더 삭제 버튼 */
        .btn-delete-folder { 
            background: rgba(248, 81, 73, 0.1); 
            color: var(--danger-color); 
            border: 1px solid rgba(248, 81, 73, 0.2); 
            padding: 6px 14px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 0.85rem; 
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-delete-folder:hover { background: var(--danger-color); color: white; border-color: var(--danger-color); }
        
        .empty-msg { text-align: center; color: var(--text-muted); padding: 50px 0; font-size: 1.1rem; line-height: 1.6; }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="header-area">
            <h2>📁 오답노트 폴더 보관함</h2>
            <div>
                <a href="index.html" class="btn-home">← 메인으로 이탈</a>
            </div>
        </div>

        <div id="folder-list-area">
            <p style="text-align: center; color: var(--accent-color);">🔄 클라우드 인프라에서 오답노트 폴더 트리 구조를 빌드하는 중...</p>
        </div>
    </div>

    <script>
        // ⚠️ [주소 확인] 본인의 실제 Render 주소로 기입해 두세요!
        const BACKEND_URL = "https://shins-cbt.onrender.com";
        const optionSymbols = ["", "①", "②", "③", "④"];

        async function displayFolders() {
            const listArea = document.getElementById("folder-list-area");

            try {
                const response = await fetch(`${BACKEND_URL}/api/histories`);
                const folderHistory = await response.json();

                if (folderHistory.length === 0) {
                    listArea.innerHTML = `
                        <p class="empty-msg">
                            보관된 오답 기록 폴더가 원격 DB에 존재하지 않습니다.<br>
                            <span style="font-size:0.9rem; color:var(--text-muted);">시험장에서 모의고사를 치르면 실시간 트랜잭션으로 폴더가 누적됩니다.</span>
                        </p>`;
                    return;
                }

                let htmlContent = "";
                
                folderHistory.forEach(function(folder) {
                    const badgeClass = folder.result === "합격" ? "pass" : "fail";
                    
                    htmlContent += `
                        <div class="folder-bar" onclick="toggleFolder(${folder.id})">
                            <div class="folder-info">
                                <span style="font-size: 1.1rem;">📂</span> 
                                <span>[${folder.examTitle}]</span> 
                                <span style="color: var(--text-muted); font-weight: normal;">${folder.folderName}</span>
                                <span class="badge ${badgeClass}">${folder.result} (${folder.score}점)</span>
                                <span style="font-size:12px; color: var(--text-muted); font-weight: normal; margin-left:5px;">(틀린 문항: ${folder.questions.length}개)</span>
                            </div>
                            <button class="btn-delete-folder" onclick="deleteFolder(${folder.id}, event)">폴더 삭제</button>
                        </div>
                        
                        <div class="folder-content" id="content-${folder.id}">`;

                    folder.questions.forEach(function(q) {
                        htmlContent += `
                            <div class="quiz-card">
                                <h4>No.${q.number} <span style="color:var(--text-muted); font-size:0.8rem; margin-left:6px;">[${q.subject}]</span></h4>
                                <p class="q-text">Q. ${q.question}</p>`;
                        
                        q.options.forEach(function(opt, optIdx) {
                            const idxNum = optIdx + 1;
                            const isCorrect = (idxNum === parseInt(q.answer));
                            const isUserCheck = (idxNum === parseInt(q.userAnswer));
                            
                            let optionStyle = "";
                            let checkMark = "";
                            
                            if(isCorrect) {
                                optionStyle = "background: rgba(46, 164, 79, 0.1); color: #56d364; font-weight: bold; border-left: 3px solid var(--success-color);";
                                checkMark = " <span style='font-size:12px; margin-left:6px;'>✔️ (정답)</span>";
                            } else if(isUserCheck) {
                                optionStyle = "background: rgba(248, 81, 73, 0.08); color: #ff7b72; text-decoration: line-through; border-left: 3px solid var(--danger-color);";
                                checkMark = " <span style='font-size:12px; margin-left:6px;'>❌ (내가 제출한 오답)</span>";
                            }

                            htmlContent += `<div class="opt-line" style="${optionStyle}">${optionSymbols[idxNum]} ${opt}${checkMark}</div>`;
                        });

                        htmlContent += `</div>`;
                    });

                    htmlContent += `</div>`; 
                });

                listArea.innerHTML = htmlContent;

            } catch(e) {
                console.error(e);
                listArea.innerHTML = `<p class="empty-msg" style="color:var(--danger-color);">❌ 클라우드 통신 실패! 백엔드 서버 파이프라인 연동 상태를 확인해 주세요.</p>`;
            }
        }

        function toggleFolder(folderId) {
            const contentBox = document.getElementById(`content-${folderId}`);
            if(contentBox) {
                contentBox.style.display = (contentBox.style.display === "block") ? "none" : "block";
            }
        }

        async function deleteFolder(folderId, event) {
            event.stopPropagation(); 
            
            if (confirm("해당 시험 회차의 폴더 기록과 오답 목록을 PostgreSQL 데이터베이스에서 완전히 삭제하시겠습니까?")) {
                try {
                    const response = await fetch(`${BACKEND_URL}/api/histories/${folderId}`, {
                        method: 'DELETE'
                    });
                    const resData = await response.json();
                    if(resData.success) {
                        displayFolders(); 
                    }
                } catch(err) {
                    console.error("삭제 실패:", err);
                    alert("서버 연결 실패로 인해 레코드 연쇄 삭제(CASCADE)를 수행하지 못했습니다.");
                }
            }
        }

        displayFolders();
    </script>
</body>
</html>
